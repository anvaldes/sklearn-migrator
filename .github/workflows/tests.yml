name: tests
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    if: false
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            setup.py
            pytest.ini

      - name: Install dev dependencies and package
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run tests
        run: pytest --junitxml=pytest-junit.xml

      - name: Upload test results (artifacts)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-and-coverage-${{ matrix.python-version }}
          path: |
            pytest-junit.xml
            coverage.xml
          if-no-files-found: ignore

  build-input-images:
    if: false
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        version: [
          "0.21.3",
          "0.22.0",
          "0.22.1",
          "0.23.0",
          "0.23.1",
          "0.23.2",
          "0.24.0",
          "0.24.1",
          "0.24.2",
          "1.0.0",
          "1.0.1",
          "1.0.2",
          "1.1.0",
          "1.1.1",
          "1.1.2",
          "1.1.3",
          "1.2.0",
          "1.2.1",
          "1.2.2",
          "1.3.0",
          "1.3.1",
          "1.3.2",
          "1.4.0",
          "1.4.2",
          "1.5.0",
          "1.5.1",
          "1.5.2",
          "1.6.0",
          "1.6.1",
          "1.7.0",
          "1.7.1",
          "1.7.2"
        ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build input image
        run: |
          docker build \
            -f integration/environments/input/${{ matrix.version }}/Dockerfile_input \
            -t ghcr.io/${{ github.repository }}/sklearn-migrator-input-${{ matrix.version }}:latest \
            .

      - name: Push input image
        run: |
          docker push ghcr.io/${{ github.repository }}/sklearn-migrator-input-${{ matrix.version }}:latest
  
  build-output-images:
    if: false
    runs-on: ubuntu-latest
    needs: [build-input-images]
    strategy:
      fail-fast: false
      matrix:
        version: [
          "0.21.3",
          "0.22.0",
          "0.22.1",
          "0.23.0",
          "0.23.1",
          "0.23.2",
          "0.24.0",
          "0.24.1",
          "0.24.2",
          "1.0.0",
          "1.0.1",
          "1.0.2",
          "1.1.0",
          "1.1.1",
          "1.1.2",
          "1.1.3",
          "1.2.0",
          "1.2.1",
          "1.2.2",
          "1.3.0",
          "1.3.1",
          "1.3.2",
          "1.4.0",
          "1.4.2",
          "1.5.0",
          "1.5.1",
          "1.5.2",
          "1.6.0",
          "1.6.1",
          "1.7.0",
          "1.7.1",
          "1.7.2"
        ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build output image
        run: |
          docker build \
            --build-arg VERSION=${{ matrix.version }} \
            -f integration/environments/output/${{ matrix.version }}/Dockerfile_output \
            -t ghcr.io/${{ github.repository }}/sklearn-migrator-output-${{ matrix.version }}:latest \
            .

      - name: Push output image
        run: |
          docker push ghcr.io/${{ github.repository }}/sklearn-migrator-output-${{ matrix.version }}:latest
  
  integration-tests:
    if: true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        name_model: ["svm_reg"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Pull all input images
        run: |
          for version in 0.21.3 0.22.0; do
            docker pull ghcr.io/${{ github.repository }}/sklearn-migrator-input-${version}:latest
          done

      - name: Pull all output images
        run: |
          for version in 1.7.1 1.7.2; do
            docker pull ghcr.io/${{ github.repository }}/sklearn-migrator-output-${version}:latest
          done

      - name: Run integration test
        run: python integration/scripts/run_${{ matrix.name_model }}.py

      - name: Validate performance
        run: |
          python - <<'EOF'
          import pandas as pd

          THRESHOLD = 10e-2
          name_model = "${{ matrix.name_model }}"

          df = pd.read_csv(f"performance/performance_{name_model}.csv", index_col=0)
          print(df)

          max_error = df.max(axis=1).max()
          print(f"\nMax error: {max_error}")

          assert max_error <= THRESHOLD, f"Max error {max_error} exceeds threshold {THRESHOLD} ❌"
          print("Integration test passed ✅")
          EOF

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.name_model }}
          path: logs/
          if-no-files-found: ignore

      - name: Upload performance
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-${{ matrix.name_model }}
          path: performance/performance_${{ matrix.name_model }}.csv
          if-no-files-found: ignore
      
      - name: Commit performance CSV
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add performance/
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "perf: add performance results for ${{ matrix.name_model }}" && git push